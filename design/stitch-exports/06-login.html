<!-- Form Section -->

<!-- No Bottom Navigation as per Transactional Flow Rules -->
<script>
        function togglePassword() {
            const input = document.getElementById('password-input');
            const btn = event.target;
            if (input.type === "password") {
                input.type = "text";
                btn.textContent = "Ẩn / Hide";
            } else {
                input.type = "password";
                btn.textContent = "Hiện / Show";
            }
        }

        // Language toggle micro-interaction
        const langBtn = document.getElementById('lang-toggle');
        let isVietnamese = true;
        langBtn.addEventListener('click', () => {
            isVietnamese = !isVietnamese;
            const vi = langBtn.querySelector('.vi-label');
            const en = langBtn.querySelector('.en-label');
            if (isVietnamese) {
                vi.classList.remove('opacity-60');
                en.classList.add('opacity-60');
            } else {
                vi.classList.add('opacity-60');
                en.classList.remove('opacity-60');
            }
        });

        // Add focus effect to labels
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.previousElementSibling.classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.previousElementSibling.classList.remove('text-primary');
            });
        });
    </script>
